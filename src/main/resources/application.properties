spring.application.name=Zorvyn-Assignment

# Configure these with your Supabase DB credentials via environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

app.auth.allow-header-impersonation=false
app.auth.token-ttl-minutes=480

app.rate-limit.enabled=true
app.rate-limit.max-requests-per-minute=120
